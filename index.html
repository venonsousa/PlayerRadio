<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Rádio PRO</title>

<link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: sans-serif;

  background: url("https://xatimg.com/image/2z709uX4q7li.gif") no-repeat center;
  background-size: cover;
  position: relative;
}

body::before {
  content: "";
  position: absolute;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.6);
  top: 0;
  left: 0;
}

/* PLAYER */
.player {
  position: relative;
  z-index: 1;
  width: 320px;
  padding: 20px;
  border-radius: 20px;
  backdrop-filter: blur(15px);
  background: rgba(0,0,0,0.5);
  text-align: center;
  color: #fff;
  box-shadow: 0 10px 50px rgba(0,0,0,0.8);
}

/* CAPA */
.cover {
  width: 100%;
  height: 180px;
  border-radius: 15px;
  overflow: hidden;
}

.cover img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* EQUALIZADOR */
.equalizer {
  display: flex;
  justify-content: center;
  align-items: flex-end;
  gap: 5px;
  height: 40px;
  margin: 10px 0;
}

.equalizer span {
  width: 6px;
  height: 10px;
  background: #00ff88;
  border-radius: 10px;
  animation: bounce 1s infinite ease-in-out;
}

.equalizer span:nth-child(1) { animation-delay: 0s; }
.equalizer span:nth-child(2) { animation-delay: 0.2s; }
.equalizer span:nth-child(3) { animation-delay: 0.4s; }
.equalizer span:nth-child(4) { animation-delay: 0.6s; }
.equalizer span:nth-child(5) { animation-delay: 0.8s; }

@keyframes bounce {
  0%,100% { height: 10px; }
  50% { height: 35px; }
}

/* LIVE */
.live {
  color: red;
  font-weight: bold;
  margin: 10px 0;
  animation: pulse 1s infinite;
}

@keyframes pulse {
  0% {opacity: 1;}
  50% {opacity: 0.3;}
  100% {opacity: 1;}
}

/* DATA/HORA */
.datetime {
  margin: 5px 0;
  font-size: 13px;
  color: #ccc;
}

/* INFO RÁDIO */
.radio-info {
  margin-top: 10px;
  font-size: 14px;
}

#song {
  font-weight: bold;
  margin-bottom: 5px;
}

#listeners {
  color: #ccc;
}

/* BOTÃO */
.controls button {
  border: none;
  background: none;
  cursor: pointer;
}

.controls i {
  font-size: 60px;
  background: #222;
  padding: 15px;
  border-radius: 50%;
}
</style>
</head>

<body>

<div class="player">

  <div class="cover">
    <img id="coverImg" src="https://xatimg.com/image/2z709uX4q7li.gif">
  </div>

  <div class="equalizer">
    <span></span><span></span><span></span><span></span><span></span>
  </div>

  <div class="live">🔴 AO VIVO</div>

  <div class="datetime" id="datetime"></div>

  <!-- INFO RÁDIO -->
  <div class="radio-info">
    <div id="song">🎵 Carregando música...</div>
    <div id="listeners">👥 0 ouvintes</div>
  </div>

  <audio id="player" src="https://s01.svrdedicado.org:7956/stream"></audio>

  <div class="controls">
    <button id="playPauseButton">
      <i class='bx bx-caret-right'></i>
    </button>
  </div>

</div>

<script>
const player = document.getElementById("player");
const btn = document.getElementById("playPauseButton");
const coverImg = document.getElementById("coverImg");
const eq = document.querySelector(".equalizer");

const songEl = document.getElementById("song");
const listenersEl = document.getElementById("listeners");
const dateTimeEl = document.getElementById("datetime");

const playIcon = "<i class='bx bx-caret-right'></i>";
const pauseIcon = "<i class='bx bx-pause'></i>";

// ▶️ PLAY
btn.onclick = () => {
  if (player.paused) {
    player.play();
    btn.innerHTML = pauseIcon;
    eq.style.opacity = "1";
  } else {
    player.pause();
    btn.innerHTML = playIcon;
    eq.style.opacity = "0.3";
  }
};

// 🖼️ CAPAS DINÂMICAS
const covers = [
  "https://xatimg.com/image/2z709uX4q7li.gif",
  "https://picsum.photos/400?1",
  "https://picsum.photos/400?2"
];

setInterval(() => {
  coverImg.src = covers[Math.floor(Math.random() * covers.length)];
}, 10000);

// ⏰ DATA E HORA
function updateDateTime() {
  const now = new Date();
  dateTimeEl.textContent =
    now.toLocaleDateString("pt-BR") + " • " +
    now.toLocaleTimeString("pt-BR");
}

setInterval(updateDateTime, 1000);
updateDateTime();

// 📡 API RÁDIO
const API_URL = "https://s01.svrdedicado.org:7956/status-json.xsl";

async function getRadioInfo() {
  try {
    const res = await fetch(API_URL);
    const data = await res.json();

    const source = data.icestats.source;
    const stream = Array.isArray(source) ? source[0] : source;

    songEl.textContent = "🎵 " + (stream.title || "Ao vivo");
    listenersEl.textContent = "👥 " + (stream.listeners || 0) + " ouvintes";

  } catch (e) {
    songEl.textContent = "🎵 Rádio ao vivo";
    listenersEl.textContent = "👥 --";
  }
}

setInterval(getRadioInfo, 10000);
getRadioInfo();

// estado inicial
eq.style.opacity = "0.3";
</script>

</body>
</html>
