<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Radio PRO</title>

<style>
body {
    margin:0;
    background:#0a0a0a;
    font-family:Arial;
    color:#fff;
}

/* Player */
.player {
    max-width:350px;
    margin:20px auto;
    background:#111;
    border-radius:30px;
    padding:20px;
    box-shadow:0 0 50px rgba(0,0,0,0.8);
}

/* Capa */
.cover {
    width:100%;
    height:250px;
    border-radius:25px;
    background:url('https://i.imgur.com/8Km9tLL.jpg') center/cover;
}

/* Música */
.title { font-size:18px; margin-top:10px; }
.artist { font-size:13px; color:#aaa; }

/* Botões */
.controls {
    display:flex;
    justify-content:space-around;
    margin-top:15px;
}

button {
    background:#1db954;
    border:none;
    padding:10px;
    border-radius:50%;
    color:#fff;
    font-size:18px;
}

/* Chat */
.chat {
    margin-top:20px;
    background:#000;
    border-radius:20px;
    padding:10px;
    height:200px;
    overflow-y:auto;
}

.input {
    display:flex;
    margin-top:10px;
}

input {
    flex:1;
    padding:10px;
    border:none;
    border-radius:10px;
}

.send {
    margin-left:5px;
}

/* Histórico */
.history {
    margin-top:15px;
    font-size:12px;
}
</style>
</head>

<body>

<div class="player">

<div class="cover" id="cover"></div>

<div class="title" id="title">Carregando...</div>
<div class="artist" id="artist"></div>

<div class="controls">
    <button onclick="toggle()">▶</button>
    <button onclick="like()">❤️</button>
</div>

<div class="chat" id="chat"></div>

<div class="input">
    <input id="msg" placeholder="Digite...">
    <button class="send" onclick="send()">➤</button>
</div>

<div class="history" id="history"></div>

</div>

<audio id="audio" src="https://s01.svrdedicado.org:7956/stream"></audio>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
// CONFIG FIREBASE (CRIE O SEU NO firebase.google.com)
const firebaseConfig = {
    apiKey: "SUA_KEY",
    databaseURL: "SUA_URL"
};
firebase.initializeApp(firebaseConfig);

const db = firebase.database();

const audio = document.getElementById("audio");
let playing = false;

function toggle(){
    if(playing){
        audio.pause();
    }else{
        audio.play();
    }
    playing=!playing;
}

// 🎵 música atual
async function getSong(){
    let res = await fetch("https://s01.svrdedicado.org:7956/status-json.xsl");
    let data = await res.json();

    let s = data.icestats.source;
    if(Array.isArray(s)) s=s[0];

    let song = s.title || "Ao vivo";

    let artist="", title=song;
    if(song.includes(" - ")){
        artist=song.split(" - ")[0];
        title=song.split(" - ")[1];
    }

    document.getElementById("title").innerText=title;
    document.getElementById("artist").innerText=artist;

    addHistory(song);
    getCover(song);
}

// 🖼️ capa
async function getCover(q){
    let res = await fetch("https://itunes.apple.com/search?term="+q);
    let d = await res.json();
    if(d.results.length>0){
        document.getElementById("cover").style.backgroundImage=
        "url("+d.results[0].artworkUrl100.replace("100x100","500x500")+")";
    }
}

// ❤️ like
function like(){
    db.ref("likes").push({
        song: document.getElementById("title").innerText
    });
    alert("Curtido!");
}

// 💬 chat
function send(){
    let text=document.getElementById("msg").value;
    db.ref("chat").push({msg:text});
    document.getElementById("msg").value="";
}

db.ref("chat").on("child_added", snap=>{
    let div=document.getElementById("chat");
    div.innerHTML+="<div>"+snap.val().msg+"</div>";
    div.scrollTop=div.scrollHeight;
});

// 🕘 histórico
let hist=[];
function addHistory(song){
    if(hist.includes(song)) return;
    hist.unshift(song);
    hist=hist.slice(0,5);

    document.getElementById("history").innerHTML=
        "<b>Últimas:</b><br>"+hist.join("<br>");
}

// 🔐 proteção básica
document.oncontextmenu=()=>false;
document.onkeydown=e=>{
    if(e.keyCode==123) return false;
};

setInterval(getSong,10000);
getSong();
</script>

</body>
</html>
