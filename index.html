<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Rádio PRO</title>

<link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: sans-serif;

  background: url("https://xatimg.com/image/2z709uX4q7li.gif") no-repeat center;
  background-size: cover;
  position: relative;
}

/* overlay escuro */
body::before {
  content: "";
  position: absolute;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.6);
  top: 0;
  left: 0;
}

/* PLAYER */
.player {
  position: relative;
  z-index: 1;
  width: 320px;
  padding: 20px;
  border-radius: 20px;

  backdrop-filter: blur(15px);
  background: rgba(0,0,0,0.5);

  text-align: center;
  color: #fff;
  box-shadow: 0 10px 50px rgba(0,0,0,0.8);
}

/* CAPA */
.cover {
  width: 100%;
  height: 180px;
  border-radius: 15px;
  overflow: hidden;
}

.cover img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* EQUALIZADOR */
.equalizer {
  display: flex;
  justify-content: center;
  align-items: flex-end;
  gap: 5px;
  height: 40px;
  margin: 10px 0;
}

.equalizer span {
  width: 6px;
  height: 10px;
  background: #00ff88;
  border-radius: 10px;
  animation: bounce 1s infinite ease-in-out;
}

.equalizer span:nth-child(1) { animation-delay: 0s; }
.equalizer span:nth-child(2) { animation-delay: 0.2s; }
.equalizer span:nth-child(3) { animation-delay: 0.4s; }
.equalizer span:nth-child(4) { animation-delay: 0.6s; }
.equalizer span:nth-child(5) { animation-delay: 0.8s; }

@keyframes bounce {
  0%,100% { height: 10px; }
  50% { height: 35px; }
}

/* LIVE */
.live {
  color: red;
  font-weight: bold;
  margin: 10px 0;
  animation: pulse 1s infinite;
}

@keyframes pulse {
  0% {opacity: 1;}
  50% {opacity: 0.3;}
  100% {opacity: 1;}
}

/* BOTÃO */
.controls button {
  border: none;
  background: none;
  cursor: pointer;
}

.controls i {
  font-size: 60px;
  background: #222;
  padding: 15px;
  border-radius: 50%;
  transition: 0.3s;
}

.controls i:hover {
  background: #444;
}
</style>
</head>

<body>

<div class="player">

  <div class="cover">
    <img id="coverImg" src="https://xatimg.com/image/2z709uX4q7li.gif">
  </div>

  <div class="equalizer">
    <span></span><span></span><span></span><span></span><span></span>
  </div>

  <div class="live">🔴 AO VIVO</div>

  <audio id="player" src="https://s01.svrdedicado.org:7956/stream"></audio>

  <div class="controls">
    <button id="playPauseButton">
      <i class='bx bx-caret-right'></i>
    </button>
  </div>

</div>

<script>
const player = document.getElementById("player");
const btn = document.getElementById("playPauseButton");
const coverImg = document.getElementById("coverImg");
const eq = document.querySelector(".equalizer");

const playIcon = "<i class='bx bx-caret-right'></i>";
const pauseIcon = "<i class='bx bx-pause'></i>";

// ▶️ play/pause
btn.onclick = () => {
  if (player.paused) {
    player.play();
    btn.innerHTML = pauseIcon;
    eq.style.opacity = "1";
  } else {
    player.pause();
    btn.innerHTML = playIcon;
    eq.style.opacity = "0.3";
  }
};

// 🖼️ capas dinâmicas (simulação)
const covers = [
  "https://xatimg.com/image/2z709uX4q7li.gif",
  "https://picsum.photos/400?1",
  "https://picsum.photos/400?2",
  "https://picsum.photos/400?3"
];

setInterval(() => {
  const random = Math.floor(Math.random() * covers.length);
  coverImg.src = covers[random];
}, 10000);

// iniciar equalizador parado
eq.style.opacity = "0.3";
</script>

</body>
</html>
