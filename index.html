<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radio PRO</title>

<style>
body {
    margin:0;
    background:#0a0a0a;
    font-family:Arial;
    color:#fff;
}

/* Player */
.player {
    max-width:350px;
    margin:20px auto;
    background:#111;
    border-radius:30px;
    padding:20px;
    box-shadow:0 0 50px rgba(0,0,0,0.8);
}

/* Capa */
.cover {
    width:100%;
    height:250px;
    border-radius:25px;
    background:url('https://i.imgur.com/8Km9tLL.jpg') center/cover;
}

/* Música */
.title { font-size:18px; margin-top:10px; }
.artist { font-size:13px; color:#aaa; }

/* Botões */
.controls {
    display:flex;
    justify-content:space-around;
    margin-top:15px;
}

button {
    background:#1db954;
    border:none;
    padding:12px;
    border-radius:50%;
    color:#fff;
    font-size:18px;
    cursor:pointer;
}

/* Chat */
.chat {
    margin-top:20px;
    background:#000;
    border-radius:20px;
    padding:10px;
    height:180px;
    overflow-y:auto;
    font-size:13px;
}

.input {
    display:flex;
    margin-top:10px;
}

input {
    flex:1;
    padding:10px;
    border:none;
    border-radius:10px;
}

.send {
    margin-left:5px;
}

/* Histórico */
.history {
    margin-top:15px;
    font-size:12px;
    color:#aaa;
}
</style>
</head>

<body>

<div class="player">

<div class="cover" id="cover"></div>

<div class="title" id="title">Carregando...</div>
<div class="artist" id="artist"></div>

<div class="controls">
    <button id="playBtn">▶</button>
    <button id="likeBtn">❤️</button>
</div>

<div class="chat" id="chat"></div>

<div class="input">
    <input id="msg" placeholder="Digite...">
    <button class="send" id="sendBtn">➤</button>
</div>

<div class="history" id="history"></div>

</div>

<audio id="audio" src="https://s01.svrdedicado.org:7956/stream"></audio>

<script>
const audio = document.getElementById("audio");
const playBtn = document.getElementById("playBtn");

let playing = false;

// ▶ Play corrigido
playBtn.onclick = async () => {
    try {
        if (playing) {
            audio.pause();
            playBtn.innerText = "▶";
        } else {
            await audio.play();
            playBtn.innerText = "⏸";
        }
        playing = !playing;
    } catch (e) {
        alert("Clique novamente para iniciar o áudio 🔊");
    }
};

// 🎵 Música atual corrigida
async function getSong(){
    try {
        const res = await fetch("https://s01.svrdedicado.org:7956/status-json.xsl");
        const data = await res.json();

        let stream = data.icestats?.source;

        if (!stream) throw "sem dados";

        if (Array.isArray(stream)) stream = stream[0];

        let song = stream.title || "Rádio ao vivo";

        let artist = "";
        let title = song;

        if (song.includes(" - ")) {
            let parts = song.split(" - ");
            artist = parts[0];
            title = parts.slice(1).join(" - ");
        }

        document.getElementById("title").innerText = title;
        document.getElementById("artist").innerText = artist;

        updateHistory(song);
        getCover(artist + " " + title);

    } catch (e) {
        document.getElementById("title").innerText = "Ao vivo 🔴";
        document.getElementById("artist").innerText = "";
    }
}

// 🖼️ Capa corrigida
async function getCover(query){
    try {
        const res = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(query)}&limit=1`);
        const data = await res.json();

        if (data.results && data.results.length > 0) {
            let img = data.results[0].artworkUrl100.replace("100x100", "500x500");
            document.getElementById("cover").style.backgroundImage = `url(${img})`;
        }
    } catch(e){}
}

// 🕘 Histórico corrigido
let historyList = [];

function updateHistory(song){
    if (!historyList.includes(song)) {
        historyList.unshift(song);
        historyList = historyList.slice(0,5);

        document.getElementById("history").innerHTML =
            "<b>Últimas:</b><br>" + historyList.join("<br>");
    }
}

// ❤️ Like (local simples)
document.getElementById("likeBtn").onclick = () => {
    alert("Você curtiu 👍");
};

// 💬 Chat LOCAL (sem Firebase agora)
const chat = document.getElementById("chat");

document.getElementById("sendBtn").onclick = () => {
    let msg = document.getElementById("msg").value.trim();
    if (!msg) return;

    let div = document.createElement("div");
    div.innerText = msg;

    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;

    document.getElementById("msg").value = "";
};

// 🔐 Proteção melhorada (sem quebrar)
document.addEventListener("contextmenu", e => e.preventDefault());

document.addEventListener("keydown", e => {
    if (
        e.key === "F12" ||
        (e.ctrlKey && e.shiftKey && ["I","J","C"].includes(e.key)) ||
        (e.ctrlKey && e.key === "U")
    ) {
        e.preventDefault();
    }
});

// 🔄 Atualização
setInterval(getSong, 10000);
getSong();
</script>

</body>
</html>
