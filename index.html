<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Rádio Player</title>

<link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: sans-serif;
  background: linear-gradient(135deg, #111, #333);
  color: #fff;
}

.player {
  max-width: 350px;
  width: 100%;
  height: 420px;
  background: #000;
  border-radius: 15px;
  padding: 20px;
  text-align: center;
  box-shadow: 0 10px 40px rgba(0,0,0,0.6);
}

.logo {
  height: 60%;
  display: flex;
  align-items: center;
  justify-content: center;
}

.logo i {
  font-size: 120px;
  color: red;
}

.live {
  color: red;
  font-weight: bold;
  margin: 10px 0;
  animation: pulse 1s infinite;
}

@keyframes pulse {
  0% {opacity: 1;}
  50% {opacity: 0.3;}
  100% {opacity: 1;}
}

.controls {
  margin-top: 20px;
}

.controls button {
  border: none;
  background: none;
  cursor: pointer;
}

.controls i {
  font-size: 60px;
  background: #222;
  padding: 15px;
  border-radius: 50%;
  transition: 0.3s;
}

.controls i:hover {
  background: #444;
}
</style>
</head>

<body>

<div class="player">

  <div class="logo">
    <i class='bx bx-radio'></i>
  </div>

  <div class="live">🔴 AO VIVO</div>

  <audio id="player" src="https://s01.svrdedicado.org:7956/stream"></audio>

  <div class="controls">
    <button id="playPauseButton">
      <i class='bx bx-caret-right'></i>
    </button>
  </div>

</div>

<script>
const player = document.getElementById("player");
const btn = document.getElementById("playPauseButton");

const playIcon = "<i class='bx bx-caret-right'></i>";
const pauseIcon = "<i class='bx bx-pause'></i>";

btn.onclick = () => {
  if (player.paused) {
    player.play();
    btn.innerHTML = pauseIcon;
  } else {
    player.pause();
    btn.innerHTML = playIcon;
  }
};
</script>

</body>
</html>
